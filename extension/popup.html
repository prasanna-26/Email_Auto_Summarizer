<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 260px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    h3 {
      margin: 0 0 12px 0;
      font-size: 16px;
    }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .ok {
      background: #e6f4ea;
      color: #137333;
    }
    .warn {
      background: #fef7e0;
      color: #b06000;
    }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #d97757;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h3>Email Summarizer</h3>
  <div id="status" class="status">Checking...</div>
  <button id="settingsBtn">Open Settings</button>
  <script src="popup.js"></script>
</body>
</html>
